name: Build GStreamer RS plugins for RPi

on:
  workflow_dispatch:
    inputs:
      gst_plugins_rs_tag:
        description: 'gst-plugins-rs tag or branch to build'
        required: true
        default: 'main'
  push:
    tags:
      - 'v*'

env:
  GST_PLUGINS_RS_TAG: ${{ github.event.inputs.gst_plugins_rs_tag || 'main' }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install cross-compilation dependencies
        run: |
          sudo dpkg --add-architecture arm64
          sudo sed -i 's/^deb /deb [arch=amd64] /' /etc/apt/sources.list.d/*.list
          echo "deb [arch=arm64] http://ports.ubuntu.com/ $(lsb_release -cs) main restricted universe multiverse" | sudo tee /etc/apt/sources.list.d/arm64.list
          echo "deb [arch=arm64] http://ports.ubuntu.com/ $(lsb_release -cs)-updates main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list.d/arm64.list
          sudo apt-get update
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu \
            pkg-config \
            libgstreamer1.0-dev:arm64 \
            libgstreamer-plugins-base1.0-dev:arm64 \
            libgstreamer-plugins-bad1.0-dev:arm64 \
            libglib2.0-dev:arm64 \
            libssl-dev:arm64 \
            libnice-dev:arm64

      - name: Install Rust with aarch64 target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Clone gst-plugins-rs
        run: |
          git clone --depth 1 --branch ${{ env.GST_PLUGINS_RS_TAG }} \
            https://gitlab.freedesktop.org/gstreamer/gst-plugins-rs.git

      - name: Configure cross-compilation environment
        run: |
          mkdir -p .cargo
          cat > .cargo/config.toml << 'TOML'
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          TOML

          echo "PKG_CONFIG_SYSROOT_DIR=/usr/aarch64-linux-gnu" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig" >> $GITHUB_ENV
          echo "PKG_CONFIG_ALLOW_CROSS=1" >> $GITHUB_ENV

      - name: Build webrtc plugins
        working-directory: gst-plugins-rs
        run: |
          cargo build --release --target aarch64-unknown-linux-gnu \
            -p gst-plugin-webrtc \
            -p gst-plugin-webrtchttp

      - name: Package plugins
        run: |
          INSTALL_DIR="opt/gst-plugins-rs/lib/aarch64-linux-gnu"
          mkdir -p "$INSTALL_DIR"
          cp gst-plugins-rs/target/aarch64-unknown-linux-gnu/release/*.so "$INSTALL_DIR/" 2>/dev/null || true
          tar -czf gst-plugins-rs-rpi.tar.gz opt/
          ls -lh gst-plugins-rs-rpi.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gst-plugins-rs-rpi
          path: gst-plugins-rs-rpi.tar.gz

      - name: Release
        uses: softprops/action-gh-release@v2
        if: github.ref_type == 'tag'
        with:
          files: gst-plugins-rs-rpi.tar.gz
          generate_release_notes: true
